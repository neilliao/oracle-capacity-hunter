name: Hunt Oracle A1.Flex Capacity

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Set up OCI config
        run: |
          mkdir -p "$HOME/.oci"
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=$HOME/.oci/oci_api_key.pem
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          EOF
          chmod 600 "$HOME/.oci/config"
          printf '%s' "${{ secrets.OCI_SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

      - name: Skip if instance already exists
        id: check
        run: |
          COUNT=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --display-name mindflows-postiz \
            --query "length(data[?\"lifecycle-state\" != 'TERMINATED'])" \
            --raw-output)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Try to launch instance
        if: steps.check.outputs.count == '0'
        id: launch
        run: |
          set +e
          RESULT=$(oci compute instance launch \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --availability-domain "${{ secrets.OCI_AD }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
            --assign-public-ip true \
            --display-name "mindflows-postiz" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            --wait-for-state RUNNING 2>&1)
          EXIT=$?
          echo "$RESULT"
          if [ $EXIT -eq 0 ]; then
            INSTANCE_ID=$(echo "$RESULT" | grep '"id"' | head -1 | sed -E 's/.*"id": "(.*)",?/\1/')
            PUBLIC_IP=$(oci compute instance list-vnics --instance-id "$INSTANCE_ID" --query "data[0].\"public-ip\"" --raw-output)
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify success via GitHub issue
        if: steps.launch.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_IP: ${{ steps.launch.outputs.public_ip }}
        run: |
          BODY=$(printf 'Public IP: %s\n\nSSH 登入: ssh -i ~/.ssh/oracle-mindflows ubuntu@%s' "$PUBLIC_IP" "$PUBLIC_IP")
          gh issue create --repo "${{ github.repository }}" --title "VM 建立成功 - mindflows-postiz" --body "$BODY"

      - name: Disable this workflow after success
        if: steps.launch.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow disable hunt.yml --repo "${{ github.repository }}"
